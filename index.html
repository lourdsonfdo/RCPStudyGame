<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#00e5ff">
  <title>RCP Study Game</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RCP Study">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=cream2">
</head>
<body>

  <main id="app">
    <!-- Each screen is a <section> with a data-screen id. app.js toggles .active. -->
    <section data-screen="home"           class="screen active"></section>
    <section data-screen="course-mode"    class="screen"></section>
    <section data-screen="boss-select"    class="screen"></section>
    <section data-screen="prep-camp"      class="screen"></section>
    <section data-screen="training"       class="screen"></section>
    <section data-screen="battle"         class="screen"></section>
    <section data-screen="results"        class="screen"></section>
    <section data-screen="scenario-select" class="screen"></section>
    <section data-screen="crisis"         class="screen"></section>
    <section data-screen="outcome"        class="screen"></section>
    <section data-screen="settings"       class="screen"></section>
    <section data-screen="level-up"       class="screen overlay"></section>
    <section data-screen="survival"       class="screen"></section>
    <section data-screen="review-answers" class="screen"></section>
  </main>

  <!-- Engine -->
  <script src="js/engine/state.js?v=cream2"></script>
  <script src="js/engine/audio.js?v=cream2"     defer></script>
  <script src="js/engine/fx.js?v=cream2"        defer></script>
  <script src="js/engine/arena-bg.js?v=cream2"  defer></script>
  <script src="js/engine/battle.js?v=cream2"    defer></script>
  <script src="js/engine/crisis.js?v=cream2"    defer></script>
  <script src="js/engine/shop.js?v=cream2"      defer></script>

  <!-- Content (stub initially; replaced by full content later) -->
  <script src="content/stub.js?v=cream2"             defer></script>
  <script src="content/boss-sprites.js?v=cream2"     defer></script>
  <script src="content/rcp103-bosses.js?v=cream2"    defer></script>
  <script src="content/rcp104-bosses.js?v=cream2"    defer></script>
  <script src="content/rcp103-q-a.js?v=cream2"       defer></script>
  <script src="content/rcp103-q-b.js?v=cream2"       defer></script>
  <script src="content/rcp103-q-training.js?v=cream2"      defer></script>
  <script src="content/rcp103-q-battle-extras.js?v=cream2" defer></script>
  <script src="content/rcp104-q-a.js?v=cream2"       defer></script>
  <script src="content/rcp104-q-b.js?v=cream2"       defer></script>
  <script src="content/rcp104-q-training.js?v=cream2"      defer></script>
  <script src="content/rcp104-q-battle-extras.js?v=cream2" defer></script>
  <script src="content/rcp103-scenarios.js?v=cream2" defer></script>
  <script src="content/rcp104-scenarios.js?v=cream2" defer></script>

  <!-- App router (loads BEFORE screen files so App.registerScreen exists) -->
  <script src="js/app.js?v=cream2" defer></script>

  <!-- Screens -->
  <script src="js/screens/home.js?v=cream2"            defer></script>
  <script src="js/screens/course-mode.js?v=cream2"     defer></script>
  <script src="js/screens/boss-select.js?v=cream2"     defer></script>
  <script src="js/screens/prep-camp.js?v=cream2"       defer></script>
  <script src="js/screens/training.js?v=cream2"        defer></script>
  <script src="js/screens/battle.js?v=cream2"          defer></script>
  <script src="js/screens/results.js?v=cream2"         defer></script>
  <script src="js/screens/scenario-select.js?v=cream2" defer></script>
  <script src="js/screens/crisis.js?v=cream2"          defer></script>
  <script src="js/screens/outcome.js?v=cream2"         defer></script>
  <script src="js/screens/settings.js?v=cream2"        defer></script>
  <script src="js/screens/level-up.js?v=cream2"        defer></script>
  <script src="js/screens/survival.js?v=cream2"        defer></script>
  <script src="js/screens/review-answers.js?v=cream2"  defer></script>

  <!-- Register service worker for PWA / offline support -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>

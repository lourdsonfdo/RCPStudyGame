<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Approach A — Vanilla CSS</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a1a;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .screen {
      width: 100%;
      max-width: 430px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .approach-tag {
      text-align: center;
      font-size: 7px;
      color: #555;
      border: 1px dashed #333;
      padding: 6px;
      letter-spacing: 1px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: #131326;
      border: 2px solid #2a2a4a;
    }
    .mode-tag { font-size: 7px; color: #ff9900; text-shadow: 0 0 6px #ff9900; }
    .course-tag { font-size: 7px; background: #22cc44; color: #000; padding: 3px 7px; }
    .chapter-tag { font-size: 7px; color: #666; }
    .hp-block {
      background: #131326;
      border: 2px solid #2a2a4a;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hp-row { display: flex; align-items: center; gap: 8px; font-size: 6px; }
    .hp-name { width: 52px; flex-shrink: 0; color: #aaa; }
    .hp-track { flex: 1; height: 14px; background: #222240; border: 1px solid #444; overflow: hidden; }
    .hp-fill { height: 100%; transition: width 0.4s; }
    .hp-player { background: linear-gradient(90deg, #22aa44, #44ff66); width: 70%; }
    .hp-boss   { background: linear-gradient(90deg, #cc2222, #ff6644); width: 38%; }
    .hp-val { width: 24px; text-align: right; font-size: 6px; color: #888; }
    .arena {
      background: #0e0e22;
      border: 2px solid #2a2a4a;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }
    .arena::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(40,40,80,.25) 1px, transparent 1px),
        linear-gradient(90deg, rgba(40,40,80,.25) 1px, transparent 1px);
      background-size: 16px 16px;
    }
    .boss-emoji {
      font-size: 72px;
      line-height: 1;
      filter: drop-shadow(0 0 16px #ff4444) drop-shadow(0 0 4px #ff8888);
      animation: bob 1.8s ease-in-out infinite;
      position: relative;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-8px) rotate(2deg); }
    }
    .boss-name { font-size: 9px; color: #ff6666; text-shadow: 0 0 10px #ff4444; position: relative; }
    .boss-sub  { font-size: 6px; color: #555; position: relative; }
    .q-box {
      background: #111128;
      border: 2px solid #3355ff;
      padding: 14px;
      box-shadow: 0 0 12px #3355ff33;
    }
    .q-label { font-size: 6px; color: #3355ff; margin-bottom: 8px; }
    .q-text  { font-size: 10px; line-height: 1.9; color: #eef; }
    .answers { display: flex; flex-direction: column; gap: 6px; }
    .ans-btn {
      background: #131326;
      border: 2px solid #333355;
      color: #bbb;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 13px 12px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .ans-btn:active { transform: scale(0.97); }
    .ans-btn:hover  { border-color: #5577ff; background: #1a1a3a; }
    .ans-btn.correct { border-color: #44ff66; background: #0d2010; color: #44ff66; }
    .ans-btn.wrong   { border-color: #ff4444; background: #200d0d; color: #ff4444; }
    .ans-key { color: #5577ff; min-width: 14px; }
    .ans-btn.correct .ans-key { color: #44ff66; }
    .ans-btn.wrong   .ans-key { color: #ff4444; }
    .xp-block {
      background: #131326;
      border: 2px solid #2a2a4a;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .xp-header { display: flex; justify-content: space-between; font-size: 7px; }
    .lvl-txt    { color: #ffd700; text-shadow: 0 0 6px #ffd70066; }
    .streak-txt { color: #ff9900; }
    .xp-track { height: 10px; background: #222240; border: 1px solid #444; }
    .xp-fill  { height: 100%; background: linear-gradient(90deg, #44aa22, #88ff44); width: 45%; }
    .xp-sub   { font-size: 6px; color: #555; text-align: right; }
  </style>
</head>
<body>
<div class="screen">

  <div class="approach-tag">APPROACH A · VANILLA HTML + CSS</div>

  <div class="topbar">
    <span class="mode-tag">⚡ BOSS BATTLE</span>
    <span class="course-tag">RCP 104</span>
    <span class="chapter-tag">CH 11</span>
  </div>

  <div class="hp-block">
    <div class="hp-row">
      <span class="hp-name">PLAYER</span>
      <div class="hp-track"><div class="hp-fill hp-player"></div></div>
      <span class="hp-val">70</span>
    </div>
    <div class="hp-row">
      <span class="hp-name">BOSS</span>
      <div class="hp-track"><div class="hp-fill hp-boss"></div></div>
      <span class="hp-val">38</span>
    </div>
  </div>

  <div class="arena">
    <div class="boss-emoji">🧪</div>
    <div class="boss-name">CORTICOSTEROID BOSS</div>
    <div class="boss-sub">CHAPTER 11 · ANTI-INFLAMMATORY</div>
  </div>

  <div class="q-box">
    <div class="q-label">▸ Q3 / 10</div>
    <div class="q-text">Pulmicort's generic name is?</div>
  </div>

  <div class="answers">
    <button class="ans-btn" onclick="this.classList.add('wrong')">
      <span class="ans-key">A</span>Fluticasone
    </button>
    <button class="ans-btn correct">
      <span class="ans-key">B</span>Budesonide ✓
    </button>
    <button class="ans-btn" onclick="this.classList.add('wrong')">
      <span class="ans-key">C</span>Beclomethasone
    </button>
    <button class="ans-btn" onclick="this.classList.add('wrong')">
      <span class="ans-key">D</span>Mometasone
    </button>
  </div>

  <div class="xp-block">
    <div class="xp-header">
      <span class="lvl-txt">★ LVL 3 · INTERN RT</span>
      <span class="streak-txt">🔥 ×4 STREAK</span>
    </div>
    <div class="xp-track"><div class="xp-fill"></div></div>
    <div class="xp-sub">450 / 1000 XP</div>
  </div>

</div>
</body>
</html>
